## CognaSync — Render.com service definitions
## Docs: https://render.com/docs/yaml-spec
##
## This file defines:
##   1. The main Flask web service (already deployed)
##   2. Four cron jobs that trigger Twilio SMS flows on schedule
##
## All cron jobs share the same environment variables as the web service.
## Set INTERNAL_SECRET in the Render dashboard — cron jobs use it to authenticate
## calls to the internal trigger endpoints.
##
## Cron jobs run in UTC. Patient-local time conversion happens inside the app.

services:

  # ── Main web service ────────────────────────────────────────────────────────
  - type: web
    name: cognasync
    runtime: python
    buildCommand: pip install -r requirements.txt && cd client && npm install && npm run build
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: FLASK_ENV
        value: production
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: TWILIO_FLOW_SID_MED
        sync: false
      - key: TWILIO_FLOW_SID_SHORT
        sync: false
      - key: TWILIO_FLOW_SID_FULL
        sync: false
      - key: TWILIO_FLOW_SID_VOICE
        sync: false
      - key: INTERNAL_SECRET
        sync: false
      - key: APP_URL
        sync: false
      - key: ALLOWED_ORIGIN
        sync: false

  # ── Cron: Medication adherence SMS ─────────────────────────────────────────
  # Runs every 15 minutes to catch patients whose dose time falls in the window.
  # The app handles timezone conversion and deduplication internally.
  - type: cron
    name: cognasync-med-sms
    runtime: python
    buildCommand: pip install -r requirements.txt
    schedule: "*/15 * * * *"
    startCommand: >
      python -c "
      import os, requests;
      r = requests.post(
        os.environ['APP_URL'] + '/api/internal/trigger-medication-sms',
        headers={'X-Internal-Secret': os.environ['INTERNAL_SECRET']},
        timeout=30
      );
      print(r.status_code, r.text)
      "
    envVars:
      - key: APP_URL
        sync: false
      - key: INTERNAL_SECRET
        sync: false

  # ── Cron: Short check-in SMS (Monday and Wednesday at 9am UTC) ──────────────
  # Fires short check-in flow for patients scheduled on Mon/Wed.
  # Adjust schedule if your patient population is in a non-US timezone.
  - type: cron
    name: cognasync-short-checkin-sms
    runtime: python
    buildCommand: pip install -r requirements.txt
    schedule: "0 14 * * 1,3"   # 14:00 UTC = 9am ET (Mon & Wed)
    startCommand: >
      python -c "
      import os, requests;
      r = requests.post(
        os.environ['APP_URL'] + '/api/internal/trigger-checkin-sms',
        headers={'X-Internal-Secret': os.environ['INTERNAL_SECRET']},
        json={'type': 'short'},
        timeout=30
      );
      print(r.status_code, r.text)
      "
    envVars:
      - key: APP_URL
        sync: false
      - key: INTERNAL_SECRET
        sync: false

  # ── Cron: Full pre-appointment check-in SMS (hourly scan) ──────────────────
  # Scans for upcoming appointments and fires the full check-in flow for patients
  # whose appointment is within the next 24-48 hours. Runs hourly to minimize
  # the gap between when an appointment is scheduled and when the SMS fires.
  - type: cron
    name: cognasync-full-checkin-sms
    runtime: python
    buildCommand: pip install -r requirements.txt
    schedule: "0 * * * *"   # every hour on the hour
    startCommand: >
      python -c "
      import os, requests;
      r = requests.post(
        os.environ['APP_URL'] + '/api/internal/trigger-checkin-sms',
        headers={'X-Internal-Secret': os.environ['INTERNAL_SECRET']},
        json={'type': 'full'},
        timeout=30
      );
      print(r.status_code, r.text)
      "
    envVars:
      - key: APP_URL
        sync: false
      - key: INTERNAL_SECRET
        sync: false

  # ── Cron: Standalone voice recording SMS (Thursday at 10am UTC) ────────────
  # Fires the standalone voice invite for patients whose voice_day_of_week = Thu.
  # The app deduplicates so patients don't receive a second invite if they
  # already got one attached to a full check-in this week.
  - type: cron
    name: cognasync-voice-sms
    runtime: python
    buildCommand: pip install -r requirements.txt
    schedule: "0 15 * * 4"   # 15:00 UTC = 10am ET (Thursday)
    startCommand: >
      python -c "
      import os, requests;
      r = requests.post(
        os.environ['APP_URL'] + '/api/internal/trigger-voice-sms',
        headers={'X-Internal-Secret': os.environ['INTERNAL_SECRET']},
        timeout=30
      );
      print(r.status_code, r.text)
      "
    envVars:
      - key: APP_URL
        sync: false
      - key: INTERNAL_SECRET
        sync: false

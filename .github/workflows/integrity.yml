name: repo-integrity

# Hard gate: fails the check (and surfaces on the commit/PR) if a file the app
# references has gone missing — e.g. a stale-tree commit silently deleted a
# template or a core module. Stdlib-only, so it needs no secrets and no deps.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  integrity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Static repo-integrity check (templates + critical modules)
        run: python3 scripts/check_repo_integrity.py
      - name: Byte-compile core modules (syntax check)
        run: python3 -m py_compile app.py database.py claude_api.py supabase_auth.py sms_engine.py

  # Fast test gate: the whole non-audio suite (safety layer, scoring engine,
  # data-layer failure contracts, psychiatry brief guards) runs on every push
  # with lightweight deps. This is the merge gate — if it's red, don't ship.
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install test dependencies (no audio stack)
        run: |
          python3 -m pip install --upgrade pip
          pip install pytest flask python-dotenv supabase==2.10.0 anthropic requests pytz PyJWT twilio
      - name: Run test suite (audio-dependent files excluded)
        run: |
          python3 -m pytest tests/ -q \
            --ignore=tests/test_acoustic_baseline.py \
            --ignore=tests/test_acoustic_engine.py \
            --ignore=tests/test_short_checkin_routing.py \
            --ignore=tests/test_speech_rate_transcript.py

  # Full suite including acoustic/speech tests — needs librosa, parselmouth,
  # and ffmpeg. Slower, so it runs as a separate job; a failure here blocks
  # the same as the fast job but you can see at a glance which layer broke.
  tests-audio:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: Install full dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip install -r requirements.txt pytest
      - name: Run audio-dependent tests
        run: |
          python3 -m pytest -q \
            tests/test_acoustic_baseline.py \
            tests/test_acoustic_engine.py \
            tests/test_short_checkin_routing.py \
            tests/test_speech_rate_transcript.py

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Data Temporarily Unavailable — CognaSync</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/tokens.css">
  <link rel="stylesheet" href="/static/css/style.css">
  <style>
    .du-shell {
      min-height: 100vh;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    .du-card {
      width: 100%;
      max-width: 440px;
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg, 16px);
      box-shadow: var(--shadow-resting);
      padding: 36px 32px;
      text-align: center;
    }
    .du-brand {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 28px;
    }
    .du-icon {
      width: 44px;
      height: 44px;
      background: var(--amber-light, var(--surface));
      border: 0.5px solid var(--amber, var(--border));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
    }
    .du-icon svg { color: var(--amber, var(--text-muted)); }
    .du-heading {
      font-family: 'DM Serif Display', Georgia, serif;
      font-size: 1.3rem;
      color: var(--text);
      margin-bottom: 10px;
      line-height: 1.25;
    }
    .du-body {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.875rem;
      color: var(--text-muted);
      line-height: 1.6;
      margin-bottom: 24px;
    }
    .du-retry {
      display: inline-block;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--text);
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: 10px;
      padding: 10px 20px;
      cursor: pointer;
      text-decoration: none;
    }
  </style>
</head>
<body>
<div class="du-shell">
  <div class="du-card">
    <div class="du-brand">
      <span class="brand-mark">CS</span>
      <span class="brand-name">CognaSync</span>
    </div>
    <div class="du-icon">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
        <line x1="12" y1="9" x2="12" y2="13"/>
        <line x1="12" y1="17" x2="12.01" y2="17"/>
      </svg>
    </div>
    <div class="du-heading">Some data couldn't be loaded</div>
    <div class="du-body">
      We couldn't load part of this page right now, so we've stopped rather than
      show you an incomplete view. This is usually temporary — please try again
      in a moment. If it keeps happening, contact support.
    </div>
    <a href="javascript:location.reload()" class="du-retry">Try again</a>
  </div>
</div>
</body>
</html>

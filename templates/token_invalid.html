<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Link Invalid — CognaSync</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/tokens.css">
  <link rel="stylesheet" href="/static/css/style.css">
  <style>
    .ti-shell {
      min-height: 100vh;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    .ti-card {
      width: 100%;
      max-width: 400px;
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg, 16px);
      box-shadow: var(--shadow-resting);
      padding: 36px 32px;
      text-align: center;
    }
    .ti-brand {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 28px;
    }
    .ti-icon {
      width: 44px;
      height: 44px;
      background: var(--red-light);
      border: 0.5px solid var(--red);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
    }
    .ti-icon svg { color: var(--red); }
    .ti-heading {
      font-family: 'DM Serif Display', Georgia, serif;
      font-size: 1.3rem;
      color: var(--text);
      margin-bottom: 10px;
      line-height: 1.25;
    }
    .ti-body {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.875rem;
      color: var(--text-muted);
      line-height: 1.6;
    }
  </style>
</head>
<body>
<div class="ti-shell">
  <div class="ti-card">
    <div class="ti-brand">
      <span class="brand-mark">CS</span>
      <span class="brand-name">CognaSync</span>
    </div>
    <div class="ti-icon">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/>
        <line x1="12" y1="8" x2="12" y2="12"/>
        <line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
    </div>
    <div class="ti-heading">This link is no longer valid</div>
    <div class="ti-body">{{ message }}</div>
  </div>
</div>
</body>
</html>
